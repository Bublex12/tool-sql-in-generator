<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL IN Generator</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__brand">
        <img class="site-icon" src="icon.svg" width="20" height="20" alt="" />
        <a id="hub-link" class="nav-back label" href="#">← Все инструменты</a>
      </div>
      <p class="body secondary site-header__tag">sql · in (...)</p>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title" class="display">SQL IN</h1>
        <p class="hero__lead">
          Вставьте список: с новой строки (столбец из Excel), через запятую или
          пробел — получите <code class="inline-code">IN (...)</code>.
        </p>
      </section>

      <section class="tool" aria-labelledby="input-title">
        <h2 id="input-title" class="h1">Список</h2>

        <label class="field">
          <span class="label">значения</span>
          <textarea
            id="input-list"
            class="field__input"
            rows="10"
            placeholder="302784745&#10;302784747&#10;или 1,2,3"
            spellcheck="false"
          ></textarea>
        </label>

        <label class="option">
          <input id="quote-strings" type="checkbox" checked />
          <span class="body">Всегда в одинарных кавычках</span>
        </label>

        <label class="field">
          <span class="label">результат</span>
          <textarea
            id="output-sql"
            class="field__input field__input--mono"
            rows="3"
            readonly
            aria-readonly="true"
          ></textarea>
        </label>

        <div class="tool__actions">
          <button id="copy-btn" class="button-primary" type="button">
            Копировать
          </button>
          <span id="copy-status" class="body secondary tool__status"></span>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="body secondary">Обработка в браузере</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
